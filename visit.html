<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visit Us | Coffee Beans</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@200;400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --espresso: #050505;
            --gold: #d4af37;
            --emerald: #064e3b;
            --cream: #fdfaf5;
        }

        body { 
            background-color: var(--espresso); 
            color: var(--cream); 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .font-vanguard { font-family: 'Syncopate', sans-serif; }

        /* INTERACTIVE BUTTONS */
        .cta-button {
            border: 1px solid var(--gold);
            padding: 20px 40px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 10px;
            font-weight: 700;
        }
        .cta-button:hover {
            background: var(--gold);
            color: black;
        }

        .contact-link {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            transition: color 0.3s ease;
        }
        .contact-link:hover { color: var(--gold); }

        .reveal { opacity: 0; transform: translateY(20px); transition: 1s ease-out; }
        .reveal-visible { opacity: 1; transform: translateY(0); }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 70%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body class="pb-10">
    <div class="vignette"></div>

    <nav class="fixed top-0 w-full z-[100] px-8 py-10 flex justify-between items-center mix-blend-difference">
        <a href="index.html" class="font-vanguard text-[9px] tracking-widest uppercase text-[var(--gold)]">← Index</a>
        <div class="font-vanguard text-[10px] tracking-[0.4em] opacity-40">LOCATIONS</div>
    </nav>

    <main class="min-h-screen flex flex-col items-center justify-center text-center px-6">
        
        <header class="mb-20 reveal">
            <h1 class="font-serif italic text-6xl md:text-9xl mb-4">Find Us.</h1>
            <p class="font-vanguard text-[9px] tracking-[1em] text-[var(--emerald)] uppercase">The Midlands Collection</p>
        </header>

        <div class="space-y-16 max-w-4xl w-full">
            
            <section class="reveal" style="transition-delay: 0.2s;">
                <p class="text-[10px] tracking-[0.5em] uppercase opacity-40 mb-6">Coordinates</p>
                <a href="https://www.google.com/maps/search/?api=1&query=Liberty+Midlands+Mall+Pietermaritzburg" target="_blank" class="contact-link block">
                    Liberty Midlands Mall<br>
                    Pietermaritzburg, 3201
                </a>
            </section>

            <section class="reveal" style="transition-delay: 0.4s;">
                <p class="text-[10px] tracking-[0.5em] uppercase opacity-40 mb-6">Direct Line</p>
                <a href="tel:+27333419570" class="contact-link block">
                    +27 (33) 341 9570
                </a>
            </section>

            <section class="reveal pt-10" style="transition-delay: 0.6s;">
                <div class="inline-block border-y border-white/10 py-8 px-10">
                    <div class="flex flex-col md:flex-row gap-8 md:gap-16 text-[9px] font-vanguard tracking-widest uppercase opacity-60">
                        <div>Mon — Sat <span class="text-[var(--gold)] ml-4">09:00 - 19:00</span></div>
                        <div class="hidden md:block w-px h-3 bg-white/20"></div>
                        <div>Sun <span class="text-[var(--gold)] ml-4">09:00 - 17:00</span></div>
                    </div>
                </div>
            </section>

            <section class="reveal pt-16" style="transition-delay: 0.8s;">
                <a href="https://www.google.com/maps/dir/?api=1&destination=Liberty+Midlands+Mall" target="_blank" class="cta-button">
                    <i data-lucide="map-pin" class="w-4 h-4"></i>
                    Get Directions
                </a>
            </section>

        </div>
    </main>

    <footer class="py-20 text-center border-t border-white/5 mx-10">
        <div class="font-vanguard text-xl tracking-[0.5em] text-[var(--gold)] mb-4 italic">COFFEE BEANS.</div>
        <p class="text-[8px] tracking-[0.8em] opacity-30 uppercase">South Africa • 2026</p>
    </footer>

    <script>
        lucide.createIcons();
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('reveal-visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
